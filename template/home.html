<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Anime Universe</title> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ font-family:Segoe UI,sans-serif; background:#0f172a; color:white; } header{ background:linear-gradient(90deg,#7c3aed,#2563eb); padding:30px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.3); } header h1{ font-size:50px; } .search-box{ width:90%; max-width:650px; margin:30px auto; } .search-box form{ display:flex; gap:10px; } .search-box input{ flex:1; padding:15px; border:none; border-radius:12px; font-size:16px; outline:none; } .search-box button{ padding:15px 25px; border:none; border-radius:12px; cursor:pointer; background:#2563eb; color:white; font-weight:bold; } .search-box button:hover{ background:#1d4ed8; } .count{ text-align:center; margin-bottom:25px; color:#cbd5e1; } .container{ width:90%; margin:auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:25px; padding-bottom:50px; } .anime-link{ text-decoration:none; color:white; } .card{ background:#1e293b; border-radius:20px; overflow:hidden; transition:.35s; box-shadow:0 10px 25px rgba(0,0,0,.35); } .card:hover{ transform:translateY(-8px) scale(1.03); box-shadow:0 20px 40px rgba(124,58,237,.45); } .card img{ width:100%; height:420px; object-fit:cover; } .content{ padding:20px; } .content h2{ margin-bottom:10px; } .badge{ display:inline-block; background:#7c3aed; padding:7px 14px; border-radius:20px; margin-bottom:15px; } .year{ margin-top:15px; color:#60a5fa; font-weight:bold; } .empty{ text-align:center; font-size:25px; margin-top:50px; } </style> </head> <body> <header> <h1>🎌 Anime Universe</h1> </header> <div class="search-box"> <form method="get"> <input type="text" name="q" placeholder="Anime qidirish..." value="{{ query }}" > <button type="submit">Qidirish</button> </form> </div> <p class="count"> Jami animelar: {{ count }} </p> <div class="container"> {% for anime in animes %} <a href="{% url 'anime_detail' anime.id %}" class="anime-link"> <div class="card"> <img src="{{ anime.rasm.url }}" alt="{{ anime.name }}"> <div class="content"> <h2>{{ anime.name }}</h2> <div class="badge"> {{ anime.janr }} </div> <p>{{ anime.izoh }}</p> <p class="year"> 📅 {{ anime.yili }} </p> </div> </div> </a> {% empty %} <div class="empty"> Anime topilmadi 😢 </div> {% endfor %} </div> </body> </html>
