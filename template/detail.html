<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ anime.name }}</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
    overflow-x:hidden;
}

.background{
    position:fixed;
    inset:0;
    background:url('{{ anime.rasm.url }}') center/cover no-repeat;
    filter:blur(18px) brightness(.25);
    transform:scale(1.1);
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:-1;
}

.container{
    width:90%;
    max-width:1200px;
    margin:60px auto;
    display:flex;
    gap:50px;
    align-items:center;
    flex-wrap:wrap;
}

.poster{
    flex:0 0 320px;
}

.poster img{
    width:100%;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.info{
    flex:1;
}

.back{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:#2563eb;
    padding:12px 22px;
    border-radius:10px;
    margin-bottom:25px;
}

.back:hover{
    background:#1d4ed8;
}

h1{
    font-size:50px;
    margin-bottom:20px;
}

.tag{
    display:inline-block;
    background:#7c3aed;
    padding:8px 18px;
    border-radius:20px;
    margin-right:10px;
    margin-bottom:20px;
}

.description{
    font-size:20px;
    line-height:1.8;
}

@media(max-width:900px){

.container{
    flex-direction:column;
    text-align:center;
}

.poster{
    width:280px;
}

h1{
    font-size:38px;
}

}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

<div class="poster">
<img src="{{ anime.rasm.url }}" alt="{{ anime.name }}">
</div>

<div class="info">

<a href="{% url 'home' %}" class="back">
← Orqaga
</a>

<h1>{{ anime.name }}</h1>

<div class="tag">
🎭 {{ anime.janr }}
</div>

<div class="tag">
📅 {{ anime.yili }}
</div>

<p class="description">
{{ anime.izoh }}
</p>

</div>

</div>

</body>
</html>
